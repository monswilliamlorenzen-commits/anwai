<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anwai</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body.landing {
        background: #000;
        color: #fff;
        font-family: 'Courier New', monospace;
        overflow-x: hidden;
      }

      .hero-section {
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      #kinetic-canvas {
        position: absolute;
        top: 37px;
        left: 0;
        width: 100%;
        height: calc(100% - 37px - 57px);
        z-index: 1;
        pointer-events: none;
      }

      .landing-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0.7rem 1.5rem;
        z-index: 100;
      }

      .lang-toggle-fixed {
        position: static;
        color: #fff;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }

      .lang-toggle-fixed a {
        color: #fff;
        text-decoration: none;
        opacity: 0.6;
      }

      .lang-toggle-fixed a.active { opacity: 1; }

      .lang-toggle-fixed span {
        margin: 0 0.3rem;
        opacity: 0.4;
      }

      .landing-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        padding: 1rem 2rem;
        z-index: 100;
      }

      .landing-footer a {
        color: #fff;
        text-decoration: none;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.8;
        transition: opacity 0.2s;
      }

      .landing-footer a:hover { opacity: 1; }

      .landing-footer .footer-copy {
        color: #444;
        font-family: 'Courier New', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      .disco-section {
        position: relative;
        padding: 80px 6vw 100px;
        min-height: 100vh;
        overflow: hidden;
      }

      #gradient-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .disco-section h2 {
        font-family: 'Courier New', monospace;
        font-size: clamp(2rem, 5vw, 3.5rem);
        letter-spacing: 0.1em;
        text-transform: lowercase;
        margin-bottom: 48px;
        color: #fff;
      }

      .album-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .album-link {
        display: block;
        transition: opacity 0.2s, transform 0.2s;
      }

      .album-link:hover {
        opacity: 0.8;
        transform: scale(1.02);
      }

      .album-art {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        display: block;
        object-fit: cover;
        border: 1px solid #222;
      }
    </style>
  </head>
  <body class="landing">

    <header class="landing-header">
      <div class="lang-toggle-fixed">
        <a href="index.html">SE</a>
        <span>/</span>
        <a class="active" href="index-en.html">EN</a>
      </div>
    </header>

    <footer class="landing-footer">
      <a href="#discography">Discography</a>
      <span class="footer-copy">© 2026 Anwai</span>
    </footer>

    <section class="hero-section">
      <canvas id="kinetic-canvas"></canvas>
    </section>

    <section class="disco-section" id="discography">
      <canvas id="gradient-canvas"></canvas>
      <div class="album-grid">
        <a class="album-link" href="https://open.spotify.com/album/2PeCMFOso773xZcZQxNw4C?si=zTf_Cj9tTvetiI7vMa8Utg" target="_blank" rel="noopener noreferrer">
          <img src="dreamsriks.png" alt="anwai - dreams / changing (acoustic)" class="album-art" loading="lazy" decoding="async" />
        </a>
        <a class="album-link" href="https://open.spotify.com/album/1D3nvkIslGYiYNde31Z0le?si=L6cow8Y3Tq-Ey8V0wwZJXw" target="_blank" rel="noopener noreferrer">
          <img src="dreams.png" alt="anwai - dreams" class="album-art" loading="lazy" decoding="async" />
        </a>
        <a class="album-link" href="https://open.spotify.com/album/050dh9VNMkyMcVDmDrqSaa?si=P-LXPdvkSm6nSKPhnF1Rkw" target="_blank" rel="noopener noreferrer">
          <img src="moneyrain.png" alt="anwai - money rain" class="album-art" loading="lazy" decoding="async" />
        </a>
        <a class="album-link" href="https://open.spotify.com/album/1ENutPYqMIDWUEgVnIdKar?si=yiGd2Y0oRYekrdUY8056Dw" target="_blank" rel="noopener noreferrer">
          <img src="waste of time.png" alt="anwai - waste of time" class="album-art" loading="lazy" decoding="async" />
        </a>
        <a class="album-link" href="https://open.spotify.com/track/51YdPLXCYIBgEhwhJHirjy?si=7477f54f713f41e8" target="_blank" rel="noopener noreferrer">
          <img src="movealong.png" alt="anwai - move along" class="album-art" loading="lazy" decoding="async" />
        </a>
        <a class="album-link" href="https://open.spotify.com/track/6BPHmElfRujFRYTzwfQHT8?si=f1d27b6fe3c3462f" target="_blank" rel="noopener noreferrer">

        </a>
      </div>

    <script src="three.min.js"></script>
    <script>
      (function() {
        const gradConfig = {"color1":"#8051a9","color2":"#e295fb","color3":"#50a8fc","color4":"#6779e3","speed":0.5,"scale":2,"complexity":4,"oscillationSpeed":0.3,"zoomLevel":0.832,"shadowIntensity":0.5};
        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`;
        const fragmentShader = `
          uniform vec3 u_color1; uniform vec3 u_color2; uniform vec3 u_color3; uniform vec3 u_color4;
          uniform float u_time; uniform float u_speed; uniform float u_scale; uniform float u_complexity;
          uniform float u_zoomLevel; uniform vec2 u_panOffset;
          varying vec2 vUv;
          vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
          vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
          vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}
          float snoise(vec2 v){
            const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
            vec2 i=floor(v+dot(v,C.yy)); vec2 x0=v-i+dot(i,C.xx);
            vec2 i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);
            vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1; i=mod289(i);
            vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));
            vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
            m=m*m; m=m*m;
            vec3 x=2.*fract(p*C.www)-1.; vec3 h=abs(x)-0.5;
            vec3 ox=floor(x+0.5); vec3 a0=x-ox;
            m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
            vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
            return 130.*dot(m,g);
          }
          float fbm(vec2 p){float v=0.;float a=0.5;for(float i=0.;i<6.;i++){if(i>=u_complexity)break;v+=a*snoise(p);p*=2.;a*=0.5;}return v;}
          void main(){
            vec2 uv=vUv+u_panOffset;
            vec2 pos=(uv-0.5)*(2./u_zoomLevel)+0.5; pos=pos*u_scale;
            float t=u_time*u_speed;
            float pattern=fbm(pos+vec2(t*0.3,t*0.2))+fbm(pos*1.5-vec2(t*0.2,t*0.3))*0.5;
            pattern=pattern*0.5+0.5;
            float t1=smoothstep(0.,0.33,pattern);float t2=smoothstep(0.33,0.66,pattern);float t3=smoothstep(0.66,1.,pattern);
            vec3 color=mix(u_color1,u_color2,t1);color=mix(color,u_color3,t2);color=mix(color,u_color4,t3);
            gl_FragColor=vec4(color,1.);
          }`;
        function initGradient() {
          const canvas = document.getElementById('gradient-canvas');
          if (!canvas) return;
          const scene = new THREE.Scene();
          const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
          const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
          function resize() { const s = canvas.parentElement; renderer.setSize(s.offsetWidth, s.offsetHeight); }
          resize(); window.addEventListener('resize', resize);
          const p = { color1: new THREE.Color(gradConfig.color1), color2: new THREE.Color(gradConfig.color2), color3: new THREE.Color(gradConfig.color3), color4: new THREE.Color(gradConfig.color4) };
          const orig = { color1: new THREE.Color(gradConfig.color1), color2: new THREE.Color(gradConfig.color2), color3: new THREE.Color(gradConfig.color3), color4: new THREE.Color(gradConfig.color4) };
          const mat = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms: { u_color1:{value:p.color1}, u_color2:{value:p.color2}, u_color3:{value:p.color3}, u_color4:{value:p.color4}, u_time:{value:0}, u_speed:{value:gradConfig.speed}, u_scale:{value:gradConfig.scale}, u_complexity:{value:gradConfig.complexity}, u_zoomLevel:{value:gradConfig.zoomLevel}, u_panOffset:{value:new THREE.Vector2(0,0)} } });
          scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));
          const ease = t => t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
          function animate(time) {
            const cd=5000/gradConfig.oscillationSpeed, cp=(time%cd)/cd*4;
            const gc=pos=>{const colors=[orig.color1,orig.color2,orig.color3,orig.color4],n=((pos%4)+4)%4,s=Math.floor(n),r=new THREE.Color();r.lerpColors(colors[s],colors[(s+1)%4],ease(n-s));return r;};
            p.color1.copy(gc(cp));p.color2.copy(gc(cp+1));p.color3.copy(gc(cp+2));p.color4.copy(gc(cp+3));
            mat.uniforms.u_time.value=time*0.001; renderer.render(scene,camera); requestAnimationFrame(animate);
          }
          animate(0);
        }
        if(typeof THREE!=='undefined'){initGradient();}else{const iv=setInterval(()=>{if(typeof THREE!=='undefined'){clearInterval(iv);initGradient();}},100);}
      })();
    </script>

    <script>
      const config = {
        "text": "anwai", "rows": 15, "fontSize": 92, "tracking": 0.6,
        "baseColor": "#ffffff", "chromaticEnabled": true, "chromaticOffset": 2,
        "chromaticAngle": 360, "chromaticAnimated": true,
        "glitchEnabled": true, "glitchFreq": 0.01, "glitchSlice": 16,
        "depthEnabled": true, "depthScale": 1, "depthOpacity": 0.55, "depthParallax": 1.6,
        "scrollEnabled": true, "scrollImpact": 50,
        "mouseEnabled": true, "mouseMode": "repel", "mouseRadius": 322, "mouseStrength": 104,
        "glowEnabled": true, "glowColor": "#5c5c5c", "glowBlur": 20
      };

      let time = 0, scrollProgress = 0, mouseX = 0, mouseY = 0, mouseMoved = false;

      const canvas = document.getElementById('kinetic-canvas');
      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      window.addEventListener('scroll', () => {
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress = window.scrollY / maxScroll;
      });

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY; mouseMoved = true;
      });

      function drawText() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${config.fontSize}px 'Courier New', monospace`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';

        const charWidth = ctx.measureText('M').width * config.tracking;
        const textPattern = config.text + '  ';
        const patternWidth = charWidth * textPattern.length;
        const scrollOffset = scrollProgress * config.scrollImpact;

        for (let row = 0; row < config.rows; row++) {
          const baseY = (canvas.height / (config.rows + 1)) * (row + 1);
          const depthLayer = row / config.rows;
          const depthScale = 1 - depthLayer * config.depthScale;
          const depthOpacity = 1 - depthLayer * config.depthOpacity;
          const depthOffset = scrollOffset * depthLayer * config.depthParallax * 100;
          const rowSpeed = row % 2 === 0 ? 1 : -1;
          const baseRowOffset = (time * 10 * rowSpeed + scrollOffset * 10 + depthOffset) % patternWidth;
          const repeatsNeeded = Math.ceil(canvas.width / (patternWidth * depthScale)) + 3;

          for (let repeat = -2; repeat < repeatsNeeded; repeat++) {
            for (let i = 0; i < textPattern.length; i++) {
              const char = textPattern[i];
              if (char === ' ') continue;

              let x = repeat * patternWidth + i * charWidth - baseRowOffset;
              let y = baseY;
              let scaleX = depthScale, scaleY = depthScale, opacity = depthOpacity;

              if (config.glitchEnabled && Math.random() < config.glitchFreq)
                y += Math.floor(Math.random() * config.glitchSlice) * (Math.random() > 0.5 ? 1 : -1);

              if (config.mouseEnabled && mouseMoved) {
                const dx = x - mouseX, dy = y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < config.mouseRadius) {
                  const force = (1 - dist / config.mouseRadius) * config.mouseStrength;
                  const angle = Math.atan2(dy, dx);
                  x += Math.cos(angle) * force;
                  y += Math.sin(angle) * force;
                }
              }

              if (x > -200 && x < canvas.width + 200 && y > -200 && y < canvas.height + 200) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scaleX, scaleY);
                ctx.globalAlpha = opacity;
                ctx.shadowColor = config.glowColor;
                ctx.shadowBlur = config.glowBlur;

                const offset = 2;
                const angle = (360 + time * 50) * Math.PI / 180;
                const ox = Math.cos(angle) * offset, oy = Math.sin(angle) * offset;

                ctx.fillStyle = '#ff0000';
                ctx.globalAlpha = opacity * 0.5;
                ctx.fillText(char, -ox, -oy);
                ctx.fillStyle = '#00ff00';
                ctx.fillText(char, 0, 0);
                ctx.fillStyle = '#0000ff';
                ctx.fillText(char, ox, oy);
                ctx.globalAlpha = opacity;

                ctx.shadowBlur = 0;
                ctx.restore();
              }
            }
          }
        }
        time += 0.03;
      }

      function animate() { drawText(); requestAnimationFrame(animate); }
      animate();
    </script>
  </body>
</html>
